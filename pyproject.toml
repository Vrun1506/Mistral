[tool.ruff]
target-version = "py311"
line-length = 120

[tool.ruff.lint]
select = [
    "E",     # pycodestyle errors
    "W",     # pycodestyle warnings
    "F",     # pyflakes
    "I",     # isort
    "UP",    # pyupgrade
    "B",     # flake8-bugbear
    "SIM",   # flake8-simplify
    "RUF",   # ruff-specific
]
ignore = [
    "E402",   # module-level import not at top (needed for lazy/conditional imports)
    "SIM117", # nested with statements (async context managers don't always combine cleanly)
]

[tool.ruff.lint.isort]
known-first-party = ["routers", "services"]

[tool.mypy]
python_version = "3.11"
strict = true
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true

[[tool.mypy.overrides]]
module = ["mistralai.*", "mcp.*", "authlib.*", "sklearn.*", "bertopic.*", "hdbscan.*", "umap.*"]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = [
    "services.pipeline.*",
    "services.claude_fetcher.*",
]
disallow_untyped_defs = false
disallow_untyped_calls = false
warn_return_any = false
